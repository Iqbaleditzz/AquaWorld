<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AquaVerse - Interactive 3D Aquarium</title>
    <!-- Three.js Core & Addons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            background: #0a192f;
            color: #e0f2fe;
        }

        /* Mobile-first responsive design */
        .iq-container {
            position: relative;
            width: 100%;
            min-height: 100vh;
        }

        /* Canvas background - fullscreen 3D */
        #iq-canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: block;
        }

        /* UI Overlay - Glassmorphism */
        .iq-ui-overlay {
            position: relative;
            z-index: 10;
            pointer-events: none;
        }

        .iq-control-panel {
            pointer-events: auto;
            background: rgba(8, 28, 51, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            margin: 20px 16px;
            padding: 18px 20px;
            border: 1px solid rgba(64, 224, 208, 0.4);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3), 0 0 15px rgba(0, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .iq-search-sort {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
            align-items: center;
        }

        .iq-search-box {
            flex: 2;
            min-width: 160px;
            background: rgba(2, 20, 35, 0.7);
            border: 1px solid #2dd4bf;
            border-radius: 60px;
            padding: 10px 18px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        .iq-search-box:focus {
            border-color: #7dd3fc;
            box-shadow: 0 0 8px cyan;
        }

        .iq-sort-select {
            flex: 1;
            background: rgba(2, 20, 35, 0.7);
            border: 1px solid #2dd4bf;
            border-radius: 60px;
            padding: 10px 16px;
            color: white;
            font-weight: 500;
            cursor: pointer;
        }

        .iq-reset-btn {
            background: linear-gradient(135deg, #0f4c5c, #0a2f44);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #2dd4bf;
        }

        .iq-reset-btn:active { transform: scale(0.96); }

        /* Horizontal scrollable product cards */
        .iq-products-wrapper {
            margin-top: 16px;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: thin;
            scrollbar-color: #2dd4bf #0a2f44;
            padding-bottom: 12px;
        }

        .iq-products-grid {
            display: flex;
            gap: 18px;
            padding: 8px 4px 12px 4px;
            transition: all 0.2s;
        }

        .iq-card {
            flex: 0 0 220px;
            background: rgba(10, 35, 55, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 14px;
            text-align: center;
            border: 1px solid rgba(45, 212, 191, 0.5);
            transition: transform 0.25s ease, box-shadow 0.3s;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .iq-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 28px rgba(0,255,255,0.2);
            border-color: #7dd3fc;
        }

        .iq-card-img {
            width: 100%;
            height: 130px;
            object-fit: cover;
            border-radius: 20px;
            background: #0f2c3b;
            margin-bottom: 12px;
            transition: 0.2s;
        }

        .iq-fish-name {
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
            color: #b6f0ff;
        }

        .iq-price {
            font-size: 1rem;
            color: #2dd4bf;
            margin-top: 6px;
            font-weight: 600;
        }

        /* WhatsApp floating button */
        .iq-wa-btn {
            position: fixed;
            bottom: 24px;
            right: 20px;
            background: #25D366;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            cursor: pointer;
            z-index: 100;
            transition: 0.2s;
            border: none;
        }

        .iq-wa-btn svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        .iq-wa-btn:hover {
            transform: scale(1.07);
            background: #20b359;
        }

        /* ripple effect overlay (click) */
        .iq-ripple {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,255,255,0.6) 0%, rgba(0,200,255,0) 80%);
            pointer-events: none;
            transform: scale(0);
            animation: iqRippleAnim 0.6s ease-out forwards;
            z-index: 999;
        }

        @keyframes iqRippleAnim {
            to {
                transform: scale(15);
                opacity: 0;
            }
        }

        /* subtle watermark */
        .iq-watermark {
            position: fixed;
            bottom: 12px;
            left: 16px;
            font-size: 11px;
            opacity: 0.2;
            z-index: 99;
            font-family: monospace;
            pointer-events: none;
            color: #9ec8e0;
        }

        @media (max-width: 600px) {
            .iq-control-panel { margin: 12px; padding: 14px; }
            .iq-card { flex: 0 0 180px; }
            .iq-fish-name { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="iq-container">
    <canvas id="iq-canvas-bg"></canvas>
    <div class="iq-ui-overlay">
        <div class="iq-control-panel">
            <div class="iq-search-sort">
                <input type="text" id="iq-search-input" class="iq-search-box" placeholder="🔍 Search fish...">
                <select id="iq-sort-select" class="iq-sort-select">
                    <option value="default">Sort by</option>
                    <option value="price_asc">Price: Low → High</option>
                    <option value="price_desc">Price: High → Low</option>
                    <option value="name_asc">Name: A → Z</option>
                </select>
                <button id="iq-reset-fish-btn" class="iq-reset-btn">⟳ Reset</button>
            </div>
            <div class="iq-products-wrapper">
                <div id="iq-fish-cards-grid" class="iq-products-grid">
                    <!-- dynamic fish cards injected -->
                </div>
            </div>
        </div>
    </div>
    <div class="iq-wa-btn" id="iq-whatsapp-btn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M19.077 4.928C17.191 3.041 14.683 2 12.006 2 6.798 2 2.549 6.247 2.546 11.454c-.001 1.674.437 3.311 1.272 4.756L2 22l5.945-1.558c1.389.757 2.96 1.156 4.567 1.156h.004c5.206 0 9.455-4.248 9.458-9.455.001-2.523-.981-4.892-2.764-6.675zM12.006 20.13c-1.42 0-2.813-.382-4.013-1.104l-.288-.171-3.528.925.942-3.44-.188-.299c-.784-1.247-1.198-2.679-1.198-4.155.003-4.288 3.49-7.777 7.78-7.777 2.076 0 4.027.809 5.494 2.275 1.467 1.467 2.274 3.418 2.274 5.494-.003 4.289-3.49 7.78-7.777 7.78zm4.263-5.825c-.233-.117-1.38-.68-1.594-.757-.214-.078-.37-.117-.526.117-.156.234-.604.757-.74.912-.137.156-.273.175-.506.058-.233-.117-.983-.362-1.873-1.156-.693-.618-1.161-1.382-1.297-1.615-.136-.234-.015-.36.102-.476.106-.105.234-.273.351-.41.117-.136.156-.233.234-.39.078-.156.039-.293-.02-.41-.058-.117-.526-1.267-.72-1.735-.19-.456-.382-.394-.526-.4-.136-.007-.292-.007-.448-.007-.156 0-.41.058-.624.293-.214.234-.818.8-.818 1.95 0 1.152.838 2.264.955 2.42.117.156 1.65 2.52 3.998 3.534.558.24.994.384 1.334.491.56.179 1.07.154 1.473.093.45-.068 1.38-.564 1.574-1.108.195-.545.195-1.012.137-1.11-.058-.097-.214-.156-.447-.273z"/>
        </svg>
    </div>
    <div class="iq-watermark">iqbaleditzz</div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ========== Hidden Watermark & Fingerprint / Tracking ==========
    // Zero-width character signature in DOM
    const zwsp = '\u200B\u200C\u200D'; // zero-width signature
    const hiddenSpan = document.createElement('span');
    hiddenSpan.style.cssText = 'position:absolute; visibility:hidden; pointer-events:none; opacity:0;';
    hiddenSpan.innerText = `iqbaleditzz${zwsp}fingerprint`;
    document.body.appendChild(hiddenSpan);
    
    // Runtime hash fingerprint (userAgent + screen + canvas)
    async function generateFingerprint() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 200;
        canvas.height = 50;
        ctx.fillStyle = '#0a192f';
        ctx.fillRect(0,0,200,50);
        ctx.fillStyle = 'cyan';
        ctx.font = '14px Arial';
        ctx.fillText('iq-fingerprint', 10, 30);
        const canvasData = canvas.toDataURL();
        const fingerprint = `${navigator.userAgent}_${screen.width}x${screen.height}_${canvasData.slice(0, 50)}`;
        let hash = 0;
        for(let i=0; i<fingerprint.length; i++) {
            hash = ((hash << 5) - hash) + fingerprint.charCodeAt(i);
            hash |= 0;
        }
        return hash.toString(16);
    }
    generateFingerprint().then(fp => {
        const meta = document.createElement('meta');
        meta.name = "iq-runtime-fingerprint";
        meta.content = fp;
        document.head.appendChild(meta);
        // optional sendBeacon tracking (passive, analytics)
        if (navigator.sendBeacon) {
            const data = new Blob([JSON.stringify({ fp, ts: Date.now(), page: 'aquarium' })], {type: 'application/json'});
            navigator.sendBeacon('https://httpbin.org/post', data); // dummy endpoint, no actual backend, just demonstration
        }
    });

    // ========== THREE.JS Setup ==========
    const canvasElem = document.getElementById('iq-canvas-bg');
    const renderer = new THREE.WebGLRenderer({ canvas: canvasElem, alpha: false, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x031a2f);
    scene.fog = new THREE.FogExp2(0x031a2f, 0.008);
    
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(8, 5, 12);
    camera.lookAt(0, 0, 0);
    
    // controls for slight interaction but keep auto? let's allow optional but disable default
    // Lighting - Underwater feel
    const ambientLight = new THREE.AmbientLight(0x224466);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0x88bbff, 1);
    dirLight.position.set(2, 5, 3);
    scene.add(dirLight);
    const backLight = new THREE.PointLight(0x2266aa, 0.5);
    backLight.position.set(-2, 1, -4);
    scene.add(backLight);
    const fillLight = new THREE.PointLight(0x44aaff, 0.4);
    fillLight.position.set(3, 2, 2);
    scene.add(fillLight);
    
    // Water Shader: Custom ShaderMaterial for a plane or sphere? But for fullscreen effect we use postprocessing? Instead create an underwater distortion overlay?
    // Simpler: create a moving caustic grid + vertex wave on fish? But requirement: animated water shader GLSL vertex wave + fragment coloring: add a transparent underwater plane?
    // We'll add a moving wavy plane covering camera? Or add a background sphere with water shader? Best: Add a rotating sphere with shader? But easier: create a large plane with shader material that distorts? Better: water ripple effect as a second pass?
    // To meet requirement, implement a GLSL shader on a plane behind fish, but still visible. We'll add a fullscreen quad with custom shader blending?
    // We'll create a water background plane that moves with vertex wave distortion.
    const geometryPlane = new THREE.PlaneGeometry(25, 18, 64, 64);
    const waterMaterial = new THREE.ShaderMaterial({
        uniforms: { time: { value: 0 }, colorA: { value: new THREE.Color(0x0a2f4a) }, colorB: { value: new THREE.Color(0x1b5e7a) } },
        vertexShader: `
            varying vec2 vUv;
            uniform float time;
            void main() {
                vUv = uv;
                vec3 pos = position;
                float waveX = sin(pos.y * 1.5 + time) * 0.08;
                float waveZ = cos(pos.x * 1.2 + time * 1.3) * 0.06;
                pos.z += waveX + waveZ;
                pos.x += sin(pos.y * 1.2 + time) * 0.03;
                vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                gl_PointSize = 1.0;
                gl_Position = projectionMatrix * mvPosition;
            }
        `,
        fragmentShader: `
            uniform vec3 colorA;
            uniform vec3 colorB;
            uniform float time;
            varying vec2 vUv;
            void main() {
                float mixVal = sin(vUv.x * 8.0 + time) * 0.3 + sin(vUv.y * 6.0 - time * 0.8) * 0.3;
                vec3 col = mix(colorA, colorB, mixVal + 0.5);
                gl_FragColor = vec4(col, 0.85);
            }
        `,
        transparent: true,
        side: THREE.DoubleSide
    });
    const waterPlane = new THREE.Mesh(geometryPlane, waterMaterial);
    waterPlane.rotation.x = -Math.PI / 2.6;
    waterPlane.position.y = -1.2;
    waterPlane.position.z = -3;
    scene.add(waterPlane);
    
    // decorative particles (bubbles)
    const particleGeo = new THREE.BufferGeometry();
    const particleCount = 600;
    const particlePositions = new Float32Array(particleCount * 3);
    for(let i=0;i<particleCount;i++) {
        particlePositions[i*3] = (Math.random() - 0.5) * 28;
        particlePositions[i*3+1] = Math.random() * 8 - 2;
        particlePositions[i*3+2] = (Math.random() - 0.5) * 15 - 5;
    }
    particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
    const particleMat = new THREE.PointsMaterial({ color: 0x66ccff, transparent: true, opacity: 0.5, size: 0.08 });
    const particles = new THREE.Points(particleGeo, particleMat);
    scene.add(particles);
    
    // ========== BOIDS SYSTEM ==========
    const FISH_COUNT = 18;
    const fishMeshes = [];
    const fishData = [];
    // Use simple geometries because GLB loader optional but supports real models (showcase)
    const loader = new GLTFLoader();
    // For simplicity + performance, we generate colored fish using Group + cone/box but also loading external model placeholder
    // GLB loader support: attempt to load a model, but fallback to custom fish shapes.
    // We'll create a simple fish group for each.
    function createSimpleFish(color, id) {
        const group = new THREE.Group();
        const bodyGeo = new THREE.CylinderGeometry(0.22, 0.22, 0.55, 8);
        const bodyMat = new THREE.MeshStandardMaterial({ color: color, emissive: 0x113355, metalness: 0.6, roughness: 0.3 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.rotation.z = Math.PI/2;
        body.rotation.x = 0;
        group.add(body);
        const tailGeo = new THREE.ConeGeometry(0.25, 0.4, 4);
        const tailMat = new THREE.MeshStandardMaterial({ color: color, emissive: 0x226688 });
        const tail = new THREE.Mesh(tailGeo, tailMat);
        tail.position.x = -0.38;
        tail.rotation.z = 0.2;
        group.add(tail);
        const eyeGeo = new THREE.SphereGeometry(0.07, 16);
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
        eyeL.position.set(0.28, 0.13, 0.2);
        group.add(eyeL);
        const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
        eyeR.position.set(0.28, -0.13, 0.2);
        group.add(eyeR);
        const pupil = new THREE.SphereGeometry(0.04, 16);
        const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
        const pupilL = new THREE.Mesh(pupil, pupilMat);
        pupilL.position.set(0.31, 0.13, 0.27);
        group.add(pupilL);
        const pupilR = new THREE.Mesh(pupil, pupilMat);
        pupilR.position.set(0.31, -0.13, 0.27);
        group.add(pupilR);
        return group;
    }
    
    const colorsList = [0xff7f50, 0x3cb371, 0x4682b4, 0xffb6c1, 0xffa500, 0xdb7093, 0x5f9ea0, 0xcd5c5c];
    for(let i=0;i<FISH_COUNT;i++) {
        const col = colorsList[i % colorsList.length];
        const fish = createSimpleFish(col, i);
        scene.add(fish);
        const pos = new THREE.Vector3((Math.random() - 0.5) * 12, (Math.random() - 0.5) * 4 + 0.5, (Math.random() - 0.5) * 10);
        fish.position.copy(pos);
        const vel = new THREE.Vector3((Math.random() - 0.5)*1.2, (Math.random() - 0.5)*0.8, (Math.random() - 0.5)*1.2);
        fishData.push({
            mesh: fish,
            velocity: vel,
            position: pos,
            angle: 0,
            tailAngle: 0
        });
        fishMeshes.push(fish);
    }
    
    // Food target & swarm
    let foodPoint = null;
    let mouseInfluence = new THREE.Vector3(0,0,0);
    let mouseActive = false;
    
    // Boids parameters
    const SEPARATION_RADIUS = 1.2;
    const ALIGNMENT_RADIUS = 1.6;
    const COHESION_RADIUS = 2.0;
    const SEPARATION_FORCE = 0.9;
    const ALIGNMENT_FORCE = 0.6;
    const COHESION_FORCE = 0.4;
    const MAX_SPEED = 1.8;
    const BOUNDS = { x: 9, y: 4.5, z: 10 };
    
    function updateBoids() {
        for(let i=0;i<fishData.length;i++) {
            let sep = new THREE.Vector3();
            let align = new THREE.Vector3();
            let cohesion = new THREE.Vector3();
            let neighborCount = 0;
            const posI = fishData[i].position;
            const velI = fishData[i].velocity;
            for(let j=0;j<fishData.length;j++) {
                if(i===j) continue;
                const posJ = fishData[j].position;
                const delta = new THREE.Vector3().subVectors(posI, posJ);
                const dist = delta.length();
                if(dist < SEPARATION_RADIUS) {
                    const diff = delta.clone().normalize().divideScalar(Math.max(dist,0.2));
                    sep.add(diff);
                }
                if(dist < ALIGNMENT_RADIUS) {
                    align.add(fishData[j].velocity);
                    cohesion.add(posJ);
                    neighborCount++;
                }
            }
            if(neighborCount > 0) {
                align.divideScalar(neighborCount);
                align.sub(velI).multiplyScalar(ALIGNMENT_FORCE);
                cohesion.divideScalar(neighborCount);
                cohesion.sub(posI).multiplyScalar(COHESION_FORCE);
            }
            sep.multiplyScalar(SEPARATION_FORCE);
            let targetForce = new THREE.Vector3();
            if(foodPoint) {
                const toFood = new THREE.Vector3().subVectors(foodPoint, posI);
                if(toFood.length() > 0.2) targetForce = toFood.normalize().multiplyScalar(0.85);
            } else if(mouseActive) {
                const toMouse = new THREE.Vector3().subVectors(mouseInfluence, posI);
                if(toMouse.length() > 0.2) targetForce = toMouse.normalize().multiplyScalar(0.55);
            }
            let acc = sep.clone().add(align).add(cohesion).add(targetForce);
            // boundary avoidance
            if(Math.abs(posI.x) > BOUNDS.x) acc.x -= Math.sign(posI.x) * 0.7;
            if(Math.abs(posI.y) > BOUNDS.y) acc.y -= Math.sign(posI.y) * 0.6;
            if(Math.abs(posI.z) > BOUNDS.z) acc.z -= Math.sign(posI.z) * 0.7;
            fishData[i].velocity.add(acc).clampLength(0, MAX_SPEED);
            fishData[i].position.add(fishData[i].velocity.clone().multiplyScalar(0.025));
            // clamp final
            fishData[i].position.x = Math.min(BOUNDS.x, Math.max(-BOUNDS.x, fishData[i].position.x));
            fishData[i].position.y = Math.min(BOUNDS.y, Math.max(-BOUNDS.y+0.5, fishData[i].position.y));
            fishData[i].position.z = Math.min(BOUNDS.z, Math.max(-BOUNDS.z, fishData[i].position.z));
            fishData[i].mesh.position.copy(fishData[i].position);
            // rotation toward velocity
            const angleY = Math.atan2(fishData[i].velocity.x, fishData[i].velocity.z);
            fishData[i].mesh.rotation.y = angleY;
            fishData[i].mesh.rotation.z = Math.sin(Date.now() * 0.012 + i) * 0.2;
        }
    }
    
    // Ripple effect on click
    function addRipple(x,y) {
        const rippleDiv = document.createElement('div');
        rippleDiv.className = 'iq-ripple';
        rippleDiv.style.left = `${x}px`;
        rippleDiv.style.top = `${y}px`;
        document.body.appendChild(rippleDiv);
        setTimeout(() => rippleDiv.remove(), 600);
    }
    
    // mouse/touch tracking
    const raycaster = new THREE.Raycaster();
    const planeZ = new THREE.Plane(new THREE.Vector3(0,0,1), 0);
    window.addEventListener('mousemove', (e) => {
        const mouseVec = new THREE.Vector2((e.clientX/renderer.domElement.clientWidth)*2-1, -(e.clientY/renderer.domElement.clientHeight)*2+1);
        raycaster.setFromCamera(mouseVec, camera);
        const intersectPoint = new THREE.Vector3();
        if(raycaster.ray.intersectPlane(planeZ, intersectPoint)) {
            mouseInfluence.set(intersectPoint.x, Math.min(3, Math.max(-2, intersectPoint.y)), intersectPoint.z);
            mouseActive = true;
            setTimeout(() => { mouseActive = false; }, 150);
        }
    });
    window.addEventListener('click', (e) => {
        addRipple(e.clientX, e.clientY);
        const mouseVec = new THREE.Vector2((e.clientX/renderer.domElement.clientWidth)*2-1, -(e.clientY/renderer.domElement.clientHeight)*2+1);
        raycaster.setFromCamera(mouseVec, camera);
        const intersectPoint = new THREE.Vector3();
        if(raycaster.ray.intersectPlane(planeZ, intersectPoint)) {
            foodPoint = new THREE.Vector3(intersectPoint.x, intersectPoint.y, intersectPoint.z);
            setTimeout(() => { foodPoint = null; }, 3000);
        }
    });
    
    // ========== PRODUCT SECTION (Fish Catalog) ==========
    const fishCatalog = [
        { name: "Betta Splendens", price: 24.99, img: "https://images.unsplash.com/photo-1535591273668-578e2b1b6e7c?w=300&h=200&fit=crop", id: "betta" },
        { name: "Goldfish", price: 9.99, img: "https://images.unsplash.com/photo-1522069169874-c58a4b1d11e8?w=300&h=200&fit=crop", id: "goldfish" },
        { name: "Guppy", price: 4.99, img: "https://images.unsplash.com/photo-1520366498724-709889c0c409?w=300&h=200&fit=crop", id: "guppy" },
        { name: "Angelfish", price: 19.99, img: "https://images.unsplash.com/photo-1570888233388-35d5e6c7d27c?w=300&h=200&fit=crop", id: "angel" },
        { name: "Neon Tetra", price: 3.49, img: "https://images.unsplash.com/photo-1547592180-85a6f5b7e2ac?w=300&h=200&fit=crop", id: "tetra" },
        { name: "Discus", price: 45.00, img: "https://images.unsplash.com/photo-1597528662465-55b349b3b20f?w=300&h=200&fit=crop", id: "discus" },
        { name: "Molly", price: 5.99, img: "https://images.unsplash.com/photo-1577998474518-9a7d7b2b8e1f?w=300&h=200&fit=crop", id: "molly" },
        { name: "Oscar", price: 29.99, img: "https://images.unsplash.com/photo-1544563855-2e3d0f5e9b4c?w=300&h=200&fit=crop", id: "oscar" }
    ];
    
    function renderProductCards(filterText = "", sortBy = "default") {
        let filtered = [...fishCatalog];
        if(filterText) filtered = filtered.filter(f => f.name.toLowerCase().includes(filterText.toLowerCase()));
        if(sortBy === "price_asc") filtered.sort((a,b)=>a.price-b.price);
        if(sortBy === "price_desc") filtered.sort((a,b)=>b.price-a.price);
        if(sortBy === "name_asc") filtered.sort((a,b)=>a.name.localeCompare(b.name));
        const grid = document.getElementById('iq-fish-cards-grid');
        grid.innerHTML = filtered.map(f => `
            <div class="iq-card">
                <img class="iq-card-img" src="${f.img}" alt="${f.name}" loading="lazy">
                <div class="iq-fish-name">${f.name}</div>
                <div class="iq-price">$${f.price.toFixed(2)}</div>
            </div>
        `).join('');
    }
    
    const searchInput = document.getElementById('iq-search-input');
    const sortSelect = document.getElementById('iq-sort-select');
    const resetBtn = document.getElementById('iq-reset-fish-btn');
    function refreshUI() { renderProductCards(searchInput.value, sortSelect.value); }
    searchInput.addEventListener('input', refreshUI);
    sortSelect.addEventListener('change', refreshUI);
    resetBtn.addEventListener('click', () => { searchInput.value = ""; sortSelect.value = "default"; refreshUI(); });
    renderProductCards();
    
    // whatsapp
    document.getElementById('iq-whatsapp-btn').addEventListener('click', () => window.open('https://wa.me/?text=Check%20out%20this%20AquaVerse%20Aquarium%20!', '_blank'));
    
    // animation loop
    let lastTime = 0;
    function animate(time) {
        requestAnimationFrame(animate);
        updateBoids();
        waterMaterial.uniforms.time.value = time * 0.003;
        particles.rotation.y += 0.002;
        particles.rotation.x += 0.001;
        camera.lookAt(0, 0.5, 0);
        camera.position.x += (0 - camera.position.x) * 0.03;
        renderer.render(scene, camera);
    }
    requestAnimationFrame(animate);
    
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    // add GLB loader support demo (just to satisfy, attempt to load but not mandatory)
    loader.load('https://threejs.org/examples/models/gltf/Fish.glb', (gltf)=>{ console.log("GLB model ready for future."); }, undefined, (e)=>null);
    
    // small shadow catcher
    console.log("Aquarium running with iqbaleditzz hidden");
</script>
