<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AquaWorld Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{
background:#020c1b;
color:#fff;
overflow-x:hidden;
}

/* WATER ANIMATION BACKGROUND */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle at 30% 30%,rgba(0,255,200,0.1),transparent 40%),
            radial-gradient(circle at 70% 60%,rgba(0,100,255,0.15),transparent 40%);
animation:water 10s infinite linear;
z-index:-2;
}
@keyframes water{
0%{transform:translate(0,0)}
50%{transform:translate(-5%, -5%)}
100%{transform:translate(0,0)}
}

/* 3D canvas */
#bg3d{position:fixed;top:0;left:0;z-index:-1}

/* Navbar */
nav{
display:flex;
justify-content:space-between;
padding:15px 20px;
background:rgba(2,12,27,0.8);
backdrop-filter:blur(10px);
position:sticky;top:0;
}
nav h2{color:#64ffda}

/* Hero */
.hero{text-align:center;padding:60px 20px}
.hero h1{font-size:2.5rem;color:#64ffda}

/* Controls */
.controls{text-align:center}
input,select{
padding:10px;
margin:5px;
border:none;
border-radius:20px;
width:80%;
max-width:300px;
}

/* Grid */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

/* Card */
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:15px;
overflow:hidden;
transition:0.3s;
cursor:pointer;
}
.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px rgba(0,255,200,0.3);
}
.card img{
width:100%;
height:200px;
object-fit:cover;
}
.card-content{padding:15px}
.card-content h3{color:#64ffda}
.details{display:none;font-size:.9rem;margin-top:10px}

/* WhatsApp */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25d366;
padding:15px;
border-radius:50%;
}
</style>
</head>

<body>

<canvas id="bg3d"></canvas>

<nav><h2>AquaWorld</h2></nav>

<section class="hero">
<h1>Living Art Aquarium</h1>
<p>Not decoration. Movement.</p>
</section>

<div class="controls">
<input id="search" placeholder="Search fish...">
<select id="sort">
<option value="default">Sort</option>
<option value="low">Low → High</option>
<option value="high">High → Low</option>
<option value="name">A → Z</option>
</select>
</div>

<section class="grid">

<div class="card betta" data-name="Blue Betta" data-price="300" onclick="toggleDetails(this)">
<img src="https://images.unsplash.com/photo-1518717758536-85ae29035b6d">
<div class="card-content">
<h3>Blue Betta</h3>
<p>₹300</p>
<div class="details">Deep blue, flowing fins. Dominates any tank.</div>
</div>
</div>

<div class="card betta" data-name="Red Betta" data-price="280" onclick="toggleDetails(this)">
<img src="https://images.unsplash.com/photo-1544551763-46a013bb70d5">
<div class="card-content">
<h3>Red Betta</h3>
<p>₹280</p>
<div class="details">Aggressive beauty. Pure attention magnet.</div>
</div>
</div>

<div class="card betta" data-name="Halfmoon Betta" data-price="450" onclick="toggleDetails(this)">
<img src="https://images.unsplash.com/photo-1504208434309-cb69f4fe52b0">
<div class="card-content">
<h3>Halfmoon Betta</h3>
<p>₹450</p>
<div class="details">Full 180° tail spread. Premium grade.</div>
</div>
</div>

</section>

<a href="#" class="whatsapp">💬</a>

<script>
/* 3D Fish */
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas:bg3d,alpha:true});
renderer.setSize(innerWidth,innerHeight);

const light=new THREE.PointLight(0xffffff,1);
light.position.set(5,5,5);
scene.add(light);

// fish body
const body=new THREE.Mesh(
 new THREE.SphereGeometry(0.5,32,32),
 new THREE.MeshStandardMaterial({color:0xff4d6d})
);
scene.add(body);

// tail (fake animation)
const tail=new THREE.Mesh(
 new THREE.ConeGeometry(0.3,1,32),
 new THREE.MeshStandardMaterial({color:0xff4d6d})
);
tail.position.x=-0.8;
tail.rotation.z=Math.PI/2;
body.add(tail);

camera.position.z=5;

let mouseX=0,mouseY=0;
document.addEventListener("mousemove",(e)=>{
mouseX=(e.clientX/innerWidth)*2-1;
mouseY=-(e.clientY/innerHeight)*2+1;
});

function animate(){
requestAnimationFrame(animate);

// follow
body.position.x+=(mouseX*2-body.position.x)*0.05;
body.position.y+=(mouseY*2-body.position.y)*0.05;

// tail wave
tail.rotation.y=Math.sin(Date.now()*0.01)*0.5;

renderer.render(scene,camera);
}
animate();

/* SEARCH */
search.oninput=()=>{
let v=search.value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.dataset.name.toLowerCase().includes(v)?"block":"none";
});
};

/* SORT */
sort.onchange=()=>{
let cards=[...document.querySelectorAll(".card")];
if(sort.value=="low")cards.sort((a,b)=>a.dataset.price-b.dataset.price);
if(sort.value=="high")cards.sort((a,b)=>b.dataset.price-a.dataset.price);
if(sort.value=="name")cards.sort((a,b)=>a.dataset.name.localeCompare(b.dataset.name));
cards.forEach(c=>document.querySelector(".grid").appendChild(c));
};

/* DETAILS */
function toggleDetails(c){
let d=c.querySelector(".details");
d.style.display=d.style.display=="block"?"none":"block";
}
</script>

</body>
</html>
